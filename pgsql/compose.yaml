name: ps_prj_dbs-pgsql

services:
  pgsql:
    container_name: ps_con_dbs-pgsql_main

    image: pimousservers/pgsql:17.4-alpine3.21
    build:
      context: resource
      dockerfile: ../Dockerfile
      network: host

    volumes:
      - vol-data:/var/lib/postgresql/data
    configs:
      - config
      - hba
      - source: cert
        mode: 0600
        uid: "70"
        gid: "70"
      - source: ca
        mode: 0600
        uid: "70"
        gid: "70"
    environment:
      POSTGRES_PASSWORD: empty

    networks:
      net-www:
        ipv4_address: 172.31.0.66
    ports:
      - "31010:5432"

volumes:
  vol-data:
    name: ps_vol_dbs-pgsql_data
configs:
  config:
    name: ps_cnf_dbs-pgsql_config
    file: resource/postgresql.conf
  hba:
    name: ps_cnf_dbs-pgsql_hba
    file: resource/pg_hba.conf
  cert:
    name: ps_cnf_dbs-pgsql_cert
    file: resource/s0-ps-pgsql.crt
  ca:
    name: ps_cnf_dbs-pgsql_ca
    file: resource/pimousdev-usr.chain.crt

networks:
  net-www:
    name: ps_net_dbs
    external: true